name: Collect Daily Finance Data

on:
  schedule:
    # 08:30 KST is 23:30 UTC (previous day)
    # Mon-Fri 08:30 KST -> Sun-Thu 23:30 UTC
    - cron: '30 23 * * 0-4'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run collection script
        run: npm run collect-data

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update daily finance data $(date +'%Y-%m-%d')"
            git push
          fi
