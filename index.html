<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="description" content="간단한 로또 번호 추첨 사이트" />
    <title>로또 번호 추첨기</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        max-width: 520px;
        width: 100%;
        background: linear-gradient(180deg, #111827 0%, #1e293b 100%);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
      }

      .title {
        margin: 0 0 16px;
        font-size: 2rem;
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0 0 28px;
        color: #94a3b8;
        line-height: 1.6;
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }

      button {
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 1rem;
        padding: 12px 20px;
        transition: transform 0.2s ease, background-color 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: #2563eb;
        color: white;
      }

      .secondary {
        background: #334155;
        color: #e2e8f0;
      }

      .ball-list {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }

      .ball {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70px;
        border-radius: 50%;
        font-size: 1.2rem;
        font-weight: 700;
        color: #1e293b;
        background: #f8fafc;
        box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.08);
      }

      .bonus {
        grid-column: span 6;
        display: flex;
        justify-content: center;
        gap: 10px;
        color: #cbd5e1;
      }

      .bonus .ball {
        background: #fbbf24;
        color: #0f172a;
        width: 60px;
        height: 60px;
      }

      .info {
        margin-top: 16px;
        color: #cbd5e1;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .message {
        margin: 0;
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">로또 번호 추첨기</h1>
      <p class="subtitle">버튼을 눌러 1부터 45까지의 로또 번호 6개와 보너스 번호를 추첨하세요.</p>

      <div class="button-row">
        <button class="primary" id="drawButton">번호 추첨하기</button>
        <button class="secondary" id="clearButton">초기화</button>
      </div>

      <div class="ball-list" id="ballList">
        <div class="ball">-</div>
        <div class="ball">-</div>
        <div class="ball">-</div>
        <div class="ball">-</div>
        <div class="ball">-</div>
        <div class="ball">-</div>
      </div>

      <div class="bonus" id="bonusArea">
        <span>보너스</span>
        <div class="ball" id="bonusBall">-</div>
      </div>

      <p class="info" id="infoText">추첨 버튼을 눌러 결과를 확인하세요.</p>
    </div>

    <script>
      const drawButton = document.getElementById('drawButton');
      const clearButton = document.getElementById('clearButton');
      const ballList = document.getElementById('ballList');
      const bonusBall = document.getElementById('bonusBall');
      const infoText = document.getElementById('infoText');

      function getLottoNumbers() {
        const numbers = Array.from({ length: 45 }, (_, index) => index + 1);
        for (let i = numbers.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
        }
        return numbers.slice(0, 7);
      }

      function renderLotto(numbers) {
        const mainNumbers = numbers.slice(0, 6).sort((a, b) => a - b);
        const bonusNumber = numbers[6];

        ballList.innerHTML = '';
        mainNumbers.forEach((num) => {
          const ball = document.createElement('div');
          ball.className = 'ball';
          ball.textContent = num;
          ballList.appendChild(ball);
        });

        bonusBall.textContent = bonusNumber;
        infoText.textContent = `행운을 빕니다! ${new Date().toLocaleTimeString()}에 추첨이 완료되었습니다.`;
      }

      function resetLotto() {
        ballList.innerHTML = '';
        for (let i = 0; i < 6; i += 1) {
          const placeholder = document.createElement('div');
          placeholder.className = 'ball';
          placeholder.textContent = '-';
          ballList.appendChild(placeholder);
        }
        bonusBall.textContent = '-';
        infoText.textContent = '추첨 버튼을 눌러 결과를 확인하세요.';
      }

      drawButton.addEventListener('click', () => {
        const numbers = getLottoNumbers();
        renderLotto(numbers);
      });

      clearButton.addEventListener('click', resetLotto);

      resetLotto();
    </script>
  </body>
</html>
